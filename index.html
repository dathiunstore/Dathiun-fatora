<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام فواتير Dathiun Store - Fire Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-bg: #050505;
            --card-bg: #111111;
            --fire-orange: #ff6a00;
            --fire-yellow: #ffcc00;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top, #221100 0%, #050505 100%);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem; border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 106, 0, 0.3);
            width: 100%; max-width: 550px;
            border: 2px solid var(--fire-orange);
        }
        h2, h3 { color: var(--fire-yellow); text-shadow: 2px 2px 10px rgba(255, 204, 0, 0.4); }
        
        input, select {
            width: 100%; padding: 12px;
            margin: 8px 0; border-radius: 8px;
            border: 1px solid #333; background: #1a1a1a;
            color: white; box-sizing: border-box;
            outline: none; transition: 0.3s;
            font-size: 16px; 
        }
        
        input:focus, select:focus { border-color: var(--fire-yellow); box-shadow: 0 0 8px rgba(255, 204, 0, 0.3); }
        button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 8px; font-weight: bold;
            cursor: pointer; border: none; transition: 0.3s;
            background: linear-gradient(45deg, var(--fire-orange), var(--fire-yellow));
            color: #000; font-size: 1rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4); }
        .product-box {
            background: #1a1a1a; padding: 10px;
            margin: 10px 0; border-radius: 8px;
            display: flex; gap: 8px; border-left: 4px solid var(--fire-orange);
        }
        .quick-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .ship-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-btn { 
            background: #222; color: var(--fire-yellow); 
            font-size: 0.85rem; border: 1px solid var(--fire-orange); 
        }

        /* --- ستايل بطاقة كرت الفاتورة الناري --- */
        #invoice-card-wrapper {
            display: none;
            margin-top: 20px;
        }
        .invoice-card {
            background-color: #0d0d0d;
            border: 3px solid var(--fire-orange);
            border-radius: 15px;
            padding: 25px;
            color: #fff;
            background-image: linear-gradient(135deg, #140b02 0%, #0d0d0d 100%);
            width: 100%;
            box-sizing: border-box;
        }
        .card-header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 15px; margin-bottom: 15px; }
        .card-header h1 { color: var(--fire-yellow); margin: 0; font-size: 1.8rem; text-shadow: 0 0 10px rgba(255,106,0,0.5); }
        .card-header p { color: #aaa; margin: 5px 0 0 0; font-size: 0.9rem; }
        .card-info { font-size: 0.95rem; margin-bottom: 20px; line-height: 1.6; }
        .card-info strong { color: var(--fire-orange); }
        .card-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .card-table th { border-bottom: 2px solid var(--fire-orange); text-align: right; padding: 8px; color: var(--fire-yellow); }
        .card-table td { padding: 10px 8px; border-bottom: 1px solid #222; }
        .card-totals { border-top: 2px dashed #333; padding-top: 15px; font-size: 1rem; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #ccc; }
        .total-row.grand-total { color: var(--fire-yellow); font-size: 1.3rem; font-weight: bold; border-top: 1px solid var(--fire-orange); padding-top: 10px; }
        .card-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--fire-orange); font-weight: bold; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .whatsapp-btn {
            grid-column: span 2;
            background: linear-gradient(45deg, #25D366, #075E54) !important;
            color: white !important;
            font-size: 1.1rem;
        }
        .label-text { font-size: 0.9rem; color: var(--fire-orange); margin-top: 10px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-area" style="text-align: center;">
        <h2 style="font-size: 2rem;">Dathiun Store ☣️</h2>
        <p style="color: #888;">نظام فواتير داثيون ستور</p>
        <input type="text" id="pass-input" placeholder="الرمز السري">
        <button onclick="checkPass()">🔥دخول🔥</button>
        <p id="error-msg" style="color: #ff4444; display: none;">الرمز غير صحيح!</p>
    </div>

    <div id="main-content" style="display: none;">
        <h3>🔥 إنشاء فاتورة جديدة</h3>
        <input type="text" id="name" placeholder="اسم الزبون">
        <input type="text" id="phone" placeholder="رقم الهاتف">
        <input type="text" id="address" placeholder="العنوان">
        
        <select id="duration">
            <option value="">حدد مدة العمل (اختياري)</option>
        </select>

        <span class="label-text">إضافة سريعة:</span>
        <div class="quick-btns">
            <button class="item-btn" onclick="addSpecificItem('مسدس راكويم', 55000)">🔫 مسدس راكويم</button>
            <button class="item-btn" onclick="addSpecificItem('فاس ليون', 60000)">🪓 فاس ليون</button>
            <button class="item-btn" onclick="addSpecificItem('ميداليات ٣', 10000)">🏅 ميداليات ٣</button>
            <button class="item-btn" onclick="addItem()">+ مادة مخصصة</button>
        </div>

        <div id="items-list"></div>

        <span class="label-text">سعر التوصيل:</span>
        <div class="ship-btns">
            <button type="button" style="background:#333; color:white;" onclick="setShipping(5000)">5,000</button>
            <button type="button" style="background:#333; color:white;" onclick="setShipping(6000)">6,000</button>
        </div>
        <input type="text" id="shipping" placeholder="سعر التوصيل">

        <span class="label-text">الخصم:</span>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="discount-val" placeholder="قيمة الخصم" style="flex: 2;">
            <select id="discount-type" style="flex: 1;">
                <option value="amount">دينار</option>
                <option value="percent">% نسبة</option>
            </select>
        </div>

        <button onclick="generateInvoice()" style="margin-top: 20px; font-size: 1.2rem;">توليد الفاتورة</button>

        <div id="invoice-card-wrapper">
            <div class="invoice-card" id="invoice-target">
                <div class="card-header">
                    <h1>Dathiun Store ☣️</h1>
                    <p>قائمة طلبات الزبون الإبداعية</p>
                </div>
                <div class="card-info">
                    <div><strong>الزبون:</strong> <span id="lbl-name"></span></div>
                    <div><strong>الهاتف:</strong> <span id="lbl-phone"></span></div>
                    <div><strong>العنوان:</strong> <span id="lbl-address"></span></div>
                    <div id="card-duration-box" style="display:none;"><strong>مدة العمل:</strong> <span id="lbl-duration"></span></div>
                </div>
                <table class="card-table">
                    <thead>
                        <tr>
                            <th>الـمـادة</th>
                            <th style="text-align: left;">السعر</th>
                        </tr>
                    </thead>
                    <tbody id="card-items-body">
                        </tbody>
                </table>
                <div class="card-totals">
                    <div class="total-row"><span>المجموع الفرعي:</span><span id="lbl-subtotal"></span></div>
                    <div class="total-row"><span>الخصم:</span><span id="lbl-discount"></span></div>
                    <div class="total-row"><span>أجور التوصيل:</span><span id="lbl-shipping"></span></div>
                    <div class="total-row grand-total"><span>المجموع الكلي:</span><span id="lbl-total"></span></div>
                </div>
                <div class="card-footer">
                    شكراً لدعمك لـ Dathiun Store 🧡
                </div>
            </div>

            <div class="action-btns">
                <button onclick="copyTextInvoice()" style="background: #222; color: #fff; border: 1px solid var(--fire-orange);">نسخ النص 📋</button>
                <button onclick="downloadInvoiceImage()" style="background: linear-gradient(45deg, #ff6a00, #ffcc00); color: #000;">تحميل كصورة 🖼️</button>
                <button onclick="sendToWhatsApp()" class="whatsapp-btn">إرسال الفاتورة عبر الواتساب 💬</button>
            </div>
        </div>
    </div>
</div>

<script>
    let generatedTextInvoice = ""; 
    let rawPhoneNumber = "";

    // توليد خيارات القائمة المنسدلة من 1 إلى 30 تلقائياً
    const durationSelect = document.getElementById('duration');
    for (let i = 1; i <= 30; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.text = `${i} يوم`;
        durationSelect.appendChild(option);
    }

    function fixNumbers(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/[٠-٩]/g, function(d) {
            return d.charCodeAt(0) - 1632;
        });
    }

    function checkPass() {
        const input = fixNumbers(document.getElementById('pass-input').value);
        if(input === '5445') {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function addItem() {
        const container = document.getElementById('items-list');
        const div = document.createElement('div');
        div.className = 'product-box';
        div.innerHTML = `
            <input type="text" class="p-name" placeholder="المادة" style="flex: 2;">
            <input type="text" class="p-price" placeholder="السعر" style="flex: 1;">
            <button onclick="this.parentElement.remove()" style="width:35px; background:#ff4444; color:white; padding:0; margin:0;">X</button>
        `;
        container.appendChild(div);
    }

    function addSpecificItem(name, price) {
        const container = document.getElementById('items-list');
        const div = document.createElement('div');
        div.className = 'product-box';
        div.innerHTML = `
            <input type="text" class="p-name" value="${name}" style="flex: 2;">
            <input type="text" class="p-price" value="${price}" style="flex: 1;">
            <button onclick="this.parentElement.remove()" style="width:35px; background:#ff4444; color:white; padding:0; margin:0;">X</button>
        `;
        container.appendChild(div);
    }

    function setShipping(val) { document.getElementById('shipping').value = val; }

    function generateInvoice() {
        const name = document.getElementById('name').value || "---";
        const phoneInput = document.getElementById('phone').value || "";
        rawPhoneNumber = fixNumbers(phoneInput);
        const addr = document.getElementById('address').value || "---";
        const durationValue = document.getElementById('duration').value;
        const ship = parseInt(fixNumbers(document.getElementById('shipping').value)) || 0;
        const discInput = parseInt(fixNumbers(document.getElementById('discount-val').value)) || 0;
        const discType = document.getElementById('discount-type').value;

        let formattedDuration = durationValue ? `${durationValue} أيام كحد أقصى ويكون طلبك جاهز` : "";

        document.getElementById('lbl-name').innerText = name;
        document.getElementById('lbl-phone').innerText = rawPhoneNumber || "---";
        document.getElementById('lbl-address').innerText = addr;

        if(formattedDuration) {
            document.getElementById('lbl-duration').innerText = formattedDuration;
            document.getElementById('card-duration-box').style.display = 'block';
        } else {
            document.getElementById('card-duration-box').style.display = 'none';
        }

        let itemsText = ""; let subtotal = 0; let count = 1;
        const tableBody = document.getElementById('card-items-body');
        tableBody.innerHTML = ""; 

        document.querySelectorAll('.product-box').forEach(box => {
            const pN = box.querySelector('.p-name').value;
            const pP = parseInt(fixNumbers(box.querySelector('.p-price').value)) || 0;
            if(pN) {
                itemsText += `• ${count} | ${pN} [${pP.toLocaleString()} د.ع]\n`;
                subtotal += pP; count++;

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>• ${pN}</td><td style="text-align: left;">${pP.toLocaleString()} د.ع</td>`;
                tableBody.appendChild(tr);
            }
        });

        let discAmt = (discType === 'percent') ? (subtotal * (discInput / 100)) : discInput;
        const total = subtotal - discAmt + ship;

        document.getElementById('lbl-subtotal').innerText = `${subtotal.toLocaleString()} د.ع`;
        document.getElementById('lbl-discount').innerText = `-${discAmt.toLocaleString()} د.ع`;
        document.getElementById('lbl-shipping').innerText = `${ship.toLocaleString()} د.ع`;
        document.getElementById('lbl-total').innerText = `${total.toLocaleString()} د.ع`;

        let durationLine = formattedDuration ? `• مدة العمل: ${formattedDuration}\n` : "";
        
        generatedTextInvoice = `📦 فاتورة الطلب - Dathiun Store\n` +
                    `مرحباً ${name} ✨\n` +
                    `تم تجهيز فاتورتك بنجاح ✅\n\n` +
                    `📝 تفاصيل الطلب:\n${itemsText}\n` +
                    `--------------------------\n` +
                    `💰 المجموع الفرعي: ${subtotal.toLocaleString()} د.ع\n` +
                    `📉 الخصم: -${discAmt.toLocaleString()} د.ع\n` +
                    `🚚 التوصيل: ${ship.toLocaleString()} د.ع\n` +
                    `--------------------------\n` +
                    `💵 المجموع الكلي: ${total.toLocaleString()} د.ع\n\n` +
                    `📍 معلومات الاستلام:\n` +
                    `• العنوان: ${addr}\n` +
                    `• الهاتف: ${rawPhoneNumber}\n` +
                    durationLine + `\n` +
                    `شكراً لدعمك لـ Dathiun Store ☣️\n` +
                    `نتمنى أن تنال أعمالنا إعجابكم 🧡`;

        document.getElementById('invoice-card-wrapper').style.display = 'block';
        window.scrollTo({ top: document.getElementById('invoice-card-wrapper').offsetTop, behavior: 'smooth' });
    }

    function copyTextInvoice() {
        if(!generatedTextInvoice) return;
        navigator.clipboard.writeText(generatedTextInvoice).then(() => {
            alert("تم نسخ النص بنجاح! 📋");
        });
    }

    function downloadInvoiceImage() {
        const element = document.getElementById('invoice-target');
        html2canvas(element, {
            backgroundColor: '#0d0d0d',
            scale: 2, 
            logging: false,
            useCORS: true
        }).then(canvas => {
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            const name = document.getElementById('name').value || "زبون";
            link.download = `فاتورة_Dathiun_${name}.png`;
            link.href = image;
            link.click();
        });
    }

    // الدالة المحدثة والمصلحة تماماً باستخدام الصيغة المستقرة والموثوقة wa.me
    function sendToWhatsApp() {
        if(!generatedTextInvoice) {
            alert("يرجى توليد الفاتورة أولاً!");
            return;
        }
        
        // تنظيف وحذف الفراغات والخطوط من الرقم
        let cleanPhone = rawPhoneNumber.replace(/\s+/g, '').replace(/-/g, '').replace(/\+/g, '');
        
        // معالجة صيغة رقم الموبايل وإدخال الكود الدولي للعراق تلقائياً
        if (cleanPhone.startsWith('07')) {
            cleanPhone = '964' + cleanPhone.substring(1);
        } else if (cleanPhone.startsWith('7')) {
            cleanPhone = '964' + cleanPhone;
        }
        
        if(!cleanPhone || cleanPhone === "---" || cleanPhone.length < 10) {
            alert("يرجى إدخال رقم هاتف صحيح ومكتمل للزبون لفتح محادثة واتساب!");
            return;
        }

        // استخدام encodeURIComponent للتأكد من تشفير كل الرموز والـ Emojis والأسطر بشكل آمن للمتصفحات
        const encodedText = encodeURIComponent(generatedTextInvoice);
        
        // الرابط الرسمي والمستقر لجميع أنظمة الموبايل والكمبيوتر
        const whatsappUrl = `https://wa.me/${cleanPhone}?text=${encodedText}`;
        
        // فتح الرابط
        window.open(whatsappUrl, '_blank');
    }

    addItem();
</script>
</body>
</html>
